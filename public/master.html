<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .premium-shadow {
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="bg-[#FBFBFC] text-[#1A1C1E] min-h-screen flex flex-col">
    <!-- Top Navigation -->
    <nav class="bg-white border-b border-[#E2E8F0] px-10 py-0 sticky top-0 z-30">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center h-16">
            <div class="flex items-center gap-10 h-full">
                <a href="/" class="flex items-center gap-2.5 font-bold text-lg tracking-tight">
                    <div class="w-8 h-8 rounded-lg bg-[#2563EB] text-white flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <i data-lucide="wrench" class="w-4 h-4"></i>
                    </div>
                    <span>RepairHub</span>
                </a>
                <div class="flex gap-8 h-full text-[13px] font-semibold text-[#64748B]">
                    <a href="/master.html" class="flex items-center text-[#0F172A] border-b-2 border-[#2563EB] px-1 transition-all">My Tasks</a>
                    <a href="#" class="flex items-center hover:text-[#0F172A] px-1 transition-all">History</a>
                    <a href="#" class="flex items-center hover:text-[#0F172A] px-1 transition-all">Schedule</a>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3 bg-[#F1F5F9] border border-transparent rounded-xl px-4 py-2 focus-within:bg-white focus-within:border-[#2563EB]/20 transition-all">
                    <i data-lucide="user" class="w-4 h-4 text-[#64748B]"></i>
                    <select id="masterSelect" class="bg-transparent text-[13px] font-bold outline-none cursor-pointer text-[#0F172A]" onchange="loadRequests()">
                        <option value="">Identify Yourself</option>
                    </select>
                </div>
                <div class="h-6 w-px bg-[#E2E8F0]"></div>
                <button class="relative p-2 rounded-xl hover:bg-[#F1F5F9] transition-all text-[#64748B] hover:text-[#0F172A]">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-[1600px] w-full mx-auto p-10 flex-1">
        <div class="mb-12">
            <h1 class="text-3xl font-extrabold tracking-tight text-[#0F172A] mb-2.5">My Work Queue</h1>
            <p class="text-[#64748B] font-medium opacity-80">Manage your active assignments and update service progress.</p>
        </div>

        <div class="relative min-h-[500px]">
            <!-- Loading Overlay -->
            <div id="loadingState" class="absolute inset-0 bg-white/60 backdrop-blur-[2px] z-20 flex items-center justify-center hidden transition-opacity duration-300">
                <div class="flex flex-col items-center gap-4">
                    <div class="w-12 h-12 border-[3px] border-[#2563EB]/10 border-t-[#2563EB] rounded-full animate-spin"></div>
                    <p class="text-xs font-bold text-[#64748B] uppercase tracking-widest">Updating tasks</p>
                </div>
            </div>

            <div id="requestGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                <!-- Cards injected here -->
                <div class="col-span-full py-40 text-center">
                    <div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center mx-auto mb-8 text-[#64748B]/10 border border-[#E2E8F0] shadow-sm">
                        <i data-lucide="user-check" class="w-12 h-12"></i>
                    </div>
                    <h3 class="text-xl font-bold text-[#0F172A] mb-2 tracking-tight">Identify yourself</h3>
                    <p class="text-[#64748B] max-w-xs mx-auto font-medium opacity-70">Please select your name from the navigation bar to view your assigned tasks.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="fixed inset-0 bg-[#0F172A]/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all border border-[#E2E8F0]">
            <div class="p-10 text-center">
                <div class="w-20 h-20 bg-emerald-50 rounded-2xl flex items-center justify-center mx-auto mb-8 text-emerald-600 border border-emerald-100">
                    <i data-lucide="check-circle" class="w-10 h-10"></i>
                </div>
                <h2 class="text-2xl font-bold text-[#0F172A] mb-2 tracking-tight">Finish Task?</h2>
                <p class="text-[#64748B] mb-10 text-[15px] font-medium opacity-80 leading-relaxed">Are you sure you have completed all work for request <span id="modalRequestId" class="font-mono font-bold text-[#0F172A] bg-[#F1F5F9] px-2 py-0.5 rounded border border-[#E2E8F0]"></span>?</p>
                
                <div class="flex flex-col gap-3">
                    <button id="confirmFinishBtn" class="w-full bg-[#2563EB] text-white py-4 rounded-xl font-bold hover:bg-[#1d4ed8] transition-all shadow-xl shadow-blue-500/10">
                        Yes, Finish Task
                    </button>
                    <button onclick="hideConfirmModal()" class="w-full px-6 py-4 rounded-xl font-bold text-[#64748B] hover:bg-[#F1F5F9] transition-all text-sm">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();

        let pendingRequestId = null;

        async function init() {
            const masters = await API.getUsers('master');
            const select = document.getElementById('masterSelect');
            select.innerHTML += masters.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            loadRequests();
        }

        async function loadRequests() {
            const masterId = document.getElementById('masterSelect').value;
            const grid = document.getElementById('requestGrid');
            const loading = document.getElementById('loadingState');

            if (!masterId) {
                grid.innerHTML = `
                    <div class="col-span-full py-40 text-center">
                        <div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center mx-auto mb-8 text-[#64748B]/10 border border-[#E2E8F0] shadow-sm">
                            <i data-lucide="user-check" class="w-12 h-12"></i>
                        </div>
                        <h3 class="text-xl font-bold text-[#0F172A] mb-2 tracking-tight">Identify yourself</h3>
                        <p class="text-[#64748B] max-w-xs mx-auto font-medium opacity-70">Please select your name from the navigation bar to view your assigned tasks.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            loading.classList.remove('hidden');
            const allRequests = await API.getRequests();
            const myRequests = allRequests.filter(r => 
                r.masterId == masterId && 
                (r.status === 'assigned' || r.status === 'in_progress')
            );
            loading.classList.add('hidden');

            if (myRequests.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-40 text-center">
                        <div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center mx-auto mb-8 text-emerald-500/10 border border-[#E2E8F0] shadow-sm">
                            <i data-lucide="check-circle" class="w-12 h-12 text-emerald-500"></i>
                        </div>
                        <h3 class="text-xl font-bold text-[#0F172A] mb-2 tracking-tight">You're all caught up!</h3>
                        <p class="text-[#64748B] max-w-xs mx-auto font-medium opacity-70">No active tasks assigned to you at the moment. Take a well-deserved break!</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            grid.innerHTML = myRequests.map(req => `
                <div class="bg-white p-10 rounded-2xl shadow-[0_1px_3px_0_rgba(0,0,0,0.02),0_12px_24px_-4px_rgba(0,0,0,0.04)] border border-[#E2E8F0] flex flex-col h-full group hover:border-[#2563EB]/30 transition-all duration-500 hover:shadow-2xl hover:-translate-y-1.5">
                    <div class="flex justify-between items-start mb-8">
                        <span class="text-xs font-mono font-bold text-[#64748B] opacity-40 group-hover:opacity-100 transition-opacity">#${req.id}</span>
                        <span class="px-3 py-1.5 rounded-lg text-[10px] font-extrabold uppercase tracking-[0.1em] 
                            ${req.status === 'in_progress' ? 'bg-orange-50 text-orange-600 border border-orange-100' : 'bg-blue-50 text-blue-600 border border-blue-100'}">
                            ${req.status.replace('_', ' ')}
                        </span>
                    </div>
                    
                    <div class="flex-1">
                        <h3 class="font-extrabold text-[#0F172A] text-2xl mb-3 tracking-tight group-hover:text-[#2563EB] transition-colors">${req.clientName}</h3>
                        <div class="flex items-start gap-2.5 text-[14px] text-[#64748B] mb-8 font-medium opacity-80">
                            <i data-lucide="map-pin" class="w-4.5 h-4.5 mt-0.5 shrink-0"></i>
                            <span class="leading-relaxed">${req.address}</span>
                        </div>
                        
                        <div class="bg-[#FBFBFC] p-6 rounded-2xl border border-[#E2E8F0] mb-10 group-hover:bg-white group-hover:border-[#2563EB]/10 transition-all">
                            <div class="text-[10px] font-extrabold text-[#64748B] uppercase tracking-[0.15em] mb-4 opacity-60">Problem Description</div>
                            <p class="text-[15px] text-[#0F172A] leading-relaxed font-semibold italic opacity-90">"${req.problemText}"</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        ${req.status === 'assigned' ? `
                            <button onclick="takeRequest(${req.id})" class="flex-1 bg-[#2563EB] text-white py-4.5 rounded-xl font-bold hover:bg-[#1d4ed8] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 shadow-xl shadow-blue-500/10">
                                <i data-lucide="play" class="w-4.5 h-4.5"></i>
                                Start Work
                            </button>
                        ` : `
                            <button onclick="showConfirmModal(${req.id})" class="flex-1 bg-emerald-600 text-white py-4.5 rounded-xl font-bold hover:bg-emerald-700 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 shadow-xl shadow-emerald-500/10">
                                <i data-lucide="check" class="w-4.5 h-4.5"></i>
                                Complete Task
                            </button>
                        `}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function takeRequest(id) {
            try {
                await API.takeRequest(id);
                loadRequests();
            } catch (err) {
                alert(err.message);
                loadRequests();
            }
        }

        function showConfirmModal(id) {
            pendingRequestId = id;
            document.getElementById('modalRequestId').innerText = `#${id}`;
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('confirmModal').classList.add('flex');
            
            document.getElementById('confirmFinishBtn').onclick = async () => {
                const masterId = document.getElementById('masterSelect').value;
                await API.finishRequest(pendingRequestId, masterId);
                hideConfirmModal();
                loadRequests();
            };
            lucide.createIcons();
        }

        function hideConfirmModal() {
            document.getElementById('confirmModal').classList.add('hidden');
            document.getElementById('confirmModal').classList.remove('flex');
            pendingRequestId = null;
        }

        init();
    </script>
</body>
</html>
